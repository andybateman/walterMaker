<!DOCTYPE html>
<html>

<head>
	<title>WalterMaker</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon-180x180.png">
	<link rel="apple-touch-icon" sizes="167x167" href="./icons/apple-touch-icon-167x167.png">
	<link rel="apple-touch-icon" sizes="152x152" href="./icons/apple-touch-icon-152x152.png">
	<link rel="stylesheet" href="./css.css">
</head>

<body>

<canvas id="walterMaker" width="800" height="600">
Your browser does not support the HTML5 canvas tag, booooo.
</canvas>

<form id="wm-menu">
	<label>Preset
		<select id="wm-preset">
			<option value="">—</option>
			<option value="Classic">Classic</option>
			<option value="Inverted">Inverted</option>
			<option value="Red/Black">Red/Black</option>
			<option value="Blue/Gold">Blue/Gold</option>
			<option value="Forest">Forest</option>
		</select>
	</label>
	<label>Rows <input type="number" id="wm-rows" min="1" max="99" value="13"></label>
	<label>Fill <input type="color" id="wm-fill" value="#000000"></label>
	<label>Background <input type="color" id="wm-bg" value="#ffffff"></label>
	<button type="submit">Redraw</button>
	<button type="button" id="wm-animate">Start animation</button>
	<button type="button" id="wm-save">Save image</button>
</form>

</body>
     
<script src="./js.js"></script>

</html>
